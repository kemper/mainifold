<svg class="hero-mark" width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — twisted spiral-fluted vase printing layer by layer">
      <defs>
        <!-- body fill: lit teal crest left → deep teal shadow right, gives roundness -->
        <linearGradient id="v-body" x1="20" y1="0" x2="44" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0a4f49"/><stop offset="0.22" stop-color="#0f9b8e"/>
          <stop offset="0.44" stop-color="#2dd4bf"/><stop offset="0.62" stop-color="#14b8a6"/>
          <stop offset="0.82" stop-color="#0f766e"/><stop offset="1" stop-color="#093f3a"/>
        </linearGradient>
        <!-- ellipse cap top tone -->
        <linearGradient id="v-cap" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#7af2dd"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <!-- flute crest highlight gradient (bright core, fades to teal at the rib edges) -->
        <linearGradient id="v-crest" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#5eead4" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#eafff9" stop-opacity="0.95"/>
          <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="v-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="v-plate" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1f2937"/><stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
        <!-- soft teal bloom for the live print-head layer -->
        <radialGradient id="v-glow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#7af2dd" stop-opacity="0.95"/>
          <stop offset="0.55" stop-color="#2dd4bf" stop-opacity="0.5"/>
          <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
        </radialGradient>

        <!-- vase silhouette (rounded belly → narrow waist → flared neck → lip).
             The SINGLE source of truth for the shape; everything clips to it,
             so the printed bands can never spill past the profile. -->
        <path id="v-outline" d="
          M32 51.6
          C 24.8 51.6 21.4 48.6 21.0 44.0
          C 20.6 39.4 24.4 35.8 24.6 31.4
          C 24.8 27.4 22.6 25.0 23.6 22.0
          C 24.3 19.7 26.6 18.4 26.0 16.4
          L 38.0 16.4
          C 37.4 18.4 39.7 19.7 40.4 22.0
          C 41.4 25.0 39.2 27.4 39.4 31.4
          C 39.6 35.8 43.4 39.4 43.0 44.0
          C 42.6 48.6 39.2 51.6 32 51.6 Z"/>
        <clipPath id="v-clip"><use href="#v-outline"/></clipPath>

        <!-- nine horizontal print-band clips, base (y≈51.6) up to lip (y≈16.4).
             Each .ly group fills the WHOLE vase but is confined to one band, so a
             revealed band is always an exact horizontal slice of the true shape. -->
        <clipPath id="vb0"><rect x="18" y="48.0" width="28" height="4.4"/></clipPath>
        <clipPath id="vb1"><rect x="18" y="44.0" width="28" height="4.0"/></clipPath>
        <clipPath id="vb2"><rect x="18" y="39.6" width="28" height="4.4"/></clipPath>
        <clipPath id="vb3"><rect x="18" y="35.6" width="28" height="4.0"/></clipPath>
        <clipPath id="vb4"><rect x="18" y="31.4" width="28" height="4.2"/></clipPath>
        <clipPath id="vb5"><rect x="18" y="27.0" width="28" height="4.4"/></clipPath>
        <clipPath id="vb6"><rect x="18" y="23.0" width="28" height="4.0"/></clipPath>
        <clipPath id="vb7"><rect x="18" y="19.2" width="28" height="3.8"/></clipPath>
        <clipPath id="vb8"><rect x="18" y="15.0" width="28" height="4.2"/></clipPath>
      </defs>

      <!-- contact shadow grounding the build plate -->
      <ellipse cx="32" cy="56.6" rx="14" ry="2.6" fill="url(#v-shadow)"/>

      <!-- build plate: a thin dark navy slab the vase grows from -->
      <g class="plate">
        <ellipse cx="32" cy="54" rx="13" ry="3.1" fill="#111827"/>
        <path d="M19 54 A13 3.1 0 0 0 45 54 L45 55.4 A13 3.1 0 0 1 19 55.4 Z" fill="url(#v-plate)"/>
        <ellipse cx="32" cy="54" rx="13" ry="3.1" fill="none" stroke="#14b8a6" stroke-width="0.5" stroke-opacity="0.4"/>
      </g>

      <!-- ===== the vase: everything inside is clipped to the silhouette ===== -->
      <g clip-path="url(#v-clip)">
        <!-- each .ly = one printed band: a full-body gradient rect confined to its
             clip band. Rest state = all visible = the finished smooth vase. -->
        <g class="ly ly0"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb0)"/></g>
        <g class="ly ly1"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb1)"/></g>
        <g class="ly ly2"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb2)"/></g>
        <g class="ly ly3"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb3)"/></g>
        <g class="ly ly4"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb4)"/></g>
        <g class="ly ly5"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb5)"/></g>
        <g class="ly ly6"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb6)"/></g>
        <g class="ly ly7"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb7)"/></g>
        <g class="ly ly8"><rect x="18" y="14" width="28" height="40" fill="url(#v-body)" clip-path="url(#vb8)"/></g>

        <!-- swirling FLUTES: continuous spiral ribs winding up the body. Drawn once
             over the whole vase, clipped to the silhouette. They fade in as the
             print finishes (.flutes animation) and resolve to full at rest. -->
        <g class="flutes" fill="none" stroke-linecap="round">
          <!-- darker rib valleys give depth between the lit crests -->
          <g stroke="#063f39" stroke-opacity="0.55" stroke-width="1.5">
            <path d="M29.0 51.0 q -3.6 -3.0 -1.0 -6.4 q 2.6 -3.4 -0.6 -6.4 q -3.2 -3.0 -0.2 -6.0 q 2.8 -2.8 0.2 -5.4 q -2.0 -2.0 0.6 -4.2"/>
            <path d="M35.4 50.6 q 3.4 -3.0 0.8 -6.4 q -2.6 -3.4 0.6 -6.4 q 3.2 -3.0 0.2 -6.0 q -2.8 -2.8 -0.2 -5.4 q 2.0 -2.0 -0.4 -4.2"/>
          </g>
          <!-- lit crests: bright teal highlight running up each flute -->
          <g stroke="url(#v-crest)" stroke-width="1.7">
            <path d="M26.0 49.8 q -2.0 -3.2 0.8 -6.0 q 2.8 -2.8 0.4 -6.0 q -2.4 -3.2 0.6 -6.0 q 3.0 -2.8 0.6 -5.4 q 2.4 -2.6 0.6 -5.0"/>
            <path d="M31.2 50.4 q -2.2 -3.4 0.8 -6.2 q 3.0 -2.8 0.4 -6.2 q -2.6 -3.2 0.6 -6.2 q 3.0 -2.8 0.6 -5.6 q 2.2 -2.4 0.5 -4.8"/>
            <path d="M37.6 49.6 q 2.0 -3.2 -0.8 -6.0 q -2.8 -2.8 -0.4 -6.0 q 2.4 -3.2 -0.6 -6.0 q -3.0 -2.8 -0.6 -5.4 q -2.2 -2.4 -0.5 -4.8"/>
          </g>
        </g>

        <!-- soft left-edge sheen + right-edge core shadow to round the body -->
        <path class="flutes" d="M24.5 47 C 22.6 42 25.6 36 25.0 31 C 24.6 27 23.4 24 24.6 21" fill="none" stroke="#bff7ec" stroke-width="1.2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>

      <!-- per-band rim ellipse + print-head FLASH (the freshly-laid layer's lit edge).
           Sits above the body; each blips as its band is deposited. -->
      <g clip-path="url(#v-clip)">
        <ellipse class="seam" cx="32" cy="48.0" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="44.0" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="39.6" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="35.6" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="31.4" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="27.0" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
        <ellipse class="seam" cx="32" cy="23.0" rx="11" ry="1.4" fill="none" stroke="#063f39" stroke-width="0.4" stroke-opacity="0.5"/>
      </g>
      <g clip-path="url(#v-clip)">
        <line class="flash fl0" x1="18" y1="50.2" x2="46" y2="50.2" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl1" x1="18" y1="46.0" x2="46" y2="46.0" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl2" x1="18" y1="41.8" x2="46" y2="41.8" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl3" x1="18" y1="37.6" x2="46" y2="37.6" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl4" x1="18" y1="33.4" x2="46" y2="33.4" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl5" x1="18" y1="29.2" x2="46" y2="29.2" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl6" x1="18" y1="25.0" x2="46" y2="25.0" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl7" x1="18" y1="21.0" x2="46" y2="21.0" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
        <line class="flash fl8" x1="18" y1="17.0" x2="46" y2="17.0" stroke="#eafff9" stroke-width="1.6" stroke-opacity="0"/>
      </g>

      <!-- open mouth: lip rim + dark inner bore, drawn last so it reads as a vase.
           Tied to the top band (.ly8 timing) via the .lip class so it appears with the lip. -->
      <g class="lip">
        <ellipse cx="32" cy="16.4" rx="6.0" ry="1.6" fill="url(#v-cap)"/>
        <ellipse cx="32" cy="16.6" rx="4.1" ry="1.05" fill="#0a3f3a"/>
        <path d="M26.0 16.4 A6 1.6 0 0 1 38.0 16.4" fill="none" stroke="#eafff9" stroke-width="0.6" stroke-opacity="0.85"/>
        <!-- a single warm amber maker's spark on the lip -->
        <path d="M33.7 15.35 l 2.6 -0.55" fill="none" stroke="#fbbf24" stroke-width="1.0" stroke-linecap="round" opacity="0.95"/>
      </g>

      <!-- live print-head glow: a soft teal bloom that rides up with the build front -->
      <ellipse class="head-glow" cx="32" cy="49" rx="7" ry="3.4" fill="url(#v-glow)" opacity="0"/>
    </svg>