<svg class="imp-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — an impossible isometric cube with one amber column">
      <defs>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.45"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="h-tlit" x1="8" y1="2" x2="56" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#7af0dd"/><stop offset="1" stop-color="#5eead4"/>
        </linearGradient>
        <linearGradient id="h-amb" x1="27" y1="6" x2="37" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fcd34d"/><stop offset="0.5" stop-color="#f59e0b"/><stop offset="1" stop-color="#e08a08"/>
        </linearGradient>
      </defs>

      <!-- contact shadow grounds the solid -->
      <ellipse cx="32" cy="62" rx="21" ry="2.3" fill="url(#h-shadow)"/>

      <!-- ============================================================
           IMPOSSIBLE CUBE — 12 cube edges as square-section iso beams,
           projected on a true 120° isometric grid (every face is clean).
           The central vertical = two stacked edges that line up in 2D:
             A-E (back-top vertical)  +  C-G (near-bottom vertical).
           Both are AMBER, so they read as ONE straight column. Draw
           order makes that column appear IN FRONT at the top, then the
           teal front-bottom edges (B-C / D-C) cross OVER it at mid, then
           it re-emerges IN FRONT at the bottom tip — the Penrose "aha".
           Two teal shades (lit #5eead4 / mid #2dd4bf / shade #0f9b8e)
           give every beam real volume. Coordinates baked to 0–64.
           ============================================================ -->

      <!-- back vertical A-E (mostly hidden behind the amber column) -->
      <polygon points="32.00,35.55 27.59,33.00 27.59,7.00 32.00,9.55" fill="#0f9b8e"/>
      <polygon points="36.41,33.00 32.00,35.55 32.00,9.55 36.41,7.00" fill="#2dd4bf"/>

      <!-- right side vertical B-F -->
      <polygon points="54.52,48.55 50.11,46.00 50.11,20.00 54.52,22.55" fill="#0f9b8e"/>
      <polygon points="58.93,46.00 54.52,48.55 54.52,22.55 58.93,20.00" fill="#2dd4bf"/>
      <!-- left side vertical D-H -->
      <polygon points="9.48,48.55 5.07,46.00 5.07,20.00 9.48,22.55" fill="#0f9b8e"/>
      <polygon points="13.89,46.00 9.48,48.55 9.48,22.55 13.89,20.00" fill="#2dd4bf"/>

      <!-- top-back edges E-F / E-H (the upper roof wedge) -->
      <polygon points="29.80,10.82 29.80,5.73 52.31,18.73 52.31,23.82" fill="#2dd4bf"/>
      <polygon points="34.20,3.18 29.80,5.73 52.31,18.73 56.72,16.18" fill="url(#h-tlit)"/>
      <polygon points="56.72,21.27 52.31,23.82 52.31,18.73 56.72,16.18" fill="#0a6f64"/>
      <polygon points="34.20,10.82 34.20,5.73 11.69,18.73 11.69,23.82" fill="#0f9b8e"/>
      <polygon points="29.80,3.18 34.20,5.73 11.69,18.73 7.28,16.18" fill="url(#h-tlit)"/>
      <polygon points="7.28,21.27 11.69,23.82 11.69,18.73 7.28,16.18" fill="#0a6f64"/>

      <!-- AMBER COLUMN · top segment (A-E) — IN FRONT here -->
      <polygon points="32.00,35.55 27.59,33.00 27.59,7.00 32.00,9.55" fill="#bf7407"/>
      <polygon points="36.41,33.00 32.00,35.55 32.00,9.55 36.41,7.00" fill="url(#h-amb)"/>
      <polygon points="32.00,4.45 36.41,7.00 32.00,9.55 27.59,7.00" fill="#fcd34d"/>

      <!-- back-top horizontals A-B / A-D (behind the near edges) -->
      <polygon points="29.80,36.82 29.80,31.73 52.31,44.73 52.31,49.82" fill="#2dd4bf"/>
      <polygon points="34.20,29.18 29.80,31.73 52.31,44.73 56.72,42.18" fill="#5eead4"/>
      <polygon points="34.20,36.82 34.20,31.73 11.69,44.73 11.69,49.82" fill="#0f9b8e"/>
      <polygon points="29.80,29.18 34.20,31.73 11.69,44.73 7.28,42.18" fill="#5eead4"/>

      <!-- near-top edges F-G / H-G (the front roof wedge, brightest) -->
      <polygon points="56.72,23.82 56.72,18.73 34.20,31.73 34.20,36.82" fill="#0f9b8e"/>
      <polygon points="52.31,16.18 56.72,18.73 34.20,31.73 29.80,29.18" fill="url(#h-tlit)"/>
      <polygon points="29.80,34.27 34.20,36.82 34.20,31.73 29.80,29.18" fill="#0a6f64"/>
      <polygon points="7.28,23.82 7.28,18.73 29.80,31.73 29.80,36.82" fill="#2dd4bf"/>
      <polygon points="11.69,16.18 7.28,18.73 29.80,31.73 34.20,29.18" fill="url(#h-tlit)"/>
      <polygon points="34.20,34.27 29.80,36.82 29.80,31.73 34.20,29.18" fill="#0a6f64"/>

      <!-- AMBER COLUMN · bottom segment (C-G) — IN FRONT at the tip -->
      <polygon points="32.00,61.55 27.59,59.00 27.59,33.00 32.00,35.55" fill="#bf7407"/>
      <polygon points="36.41,59.00 32.00,61.55 32.00,35.55 36.41,33.00" fill="url(#h-amb)"/>
      <polygon points="32.00,30.45 36.41,33.00 32.00,35.55 27.59,33.00" fill="#fcd34d"/>
      <!-- bottom-column edge drawn BEFORE the weave, so teal can occlude it -->
      <g fill="none" stroke="#6e4304" stroke-width="0.6" stroke-linejoin="round" opacity="0.55">
        <polygon points="27.59,33.00 32.00,30.45 36.41,33.00 36.41,59.00 32.00,61.55 27.59,59.00"/>
        <path d="M32.00,35.55 L32.00,61.55"/>
      </g>

      <!-- front-bottom horizontals B-C / D-C weave OVER amber mid (impossible) -->
      <polygon points="56.72,49.82 56.72,44.73 34.20,57.73 34.20,62.82" fill="#0f9b8e"/>
      <polygon points="52.31,42.18 56.72,44.73 34.20,57.73 29.80,55.18" fill="#5eead4"/>
      <polygon points="7.28,49.82 7.28,44.73 29.80,57.73 29.80,62.82" fill="#2dd4bf"/>
      <polygon points="11.69,42.18 7.28,44.73 29.80,57.73 34.20,55.18" fill="#5eead4"/>

      <!-- crisp dark edges on the amber column TOP (nothing occludes it) -->
      <g fill="none" stroke="#6e4304" stroke-width="0.6" stroke-linejoin="round" opacity="0.55">
        <polygon points="27.59,7.00 32.00,4.45 36.41,7.00 36.41,33.00 32.00,35.55 27.59,33.00"/>
        <path d="M32.00,9.55 L32.00,35.55"/>
      </g>
      <!-- lit highlight along the two top crests -->
      <g fill="none" stroke="#d6fff5" stroke-width="0.7" stroke-linecap="round" opacity="0.7">
        <path d="M52.31,16.18 L34.20,5.73 M11.69,16.18 L29.80,5.73"/>
      </g>
    </svg>