<svg class="hero-mark" width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — twisted column printing itself layer by layer">
      <defs>
        <linearGradient id="g-L" x1="22" y1="8" x2="30" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <linearGradient id="g-R" x1="40" y1="8" x2="34" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0d9488"/>
        </linearGradient>
        <linearGradient id="g-B" x1="24" y1="8" x2="32" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0d6f66"/><stop offset="1" stop-color="#0a5249"/>
        </linearGradient>
        <linearGradient id="g-cap" x1="27" y1="6" x2="36" y2="12" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ccfbf1"/><stop offset="1" stop-color="#5eead4"/>
        </linearGradient>
        <radialGradient id="g-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="g-plate" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1f2937"/><stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
      </defs>

      <!-- contact shadow grounding the build plate -->
      <ellipse cx="32" cy="38.6" rx="15" ry="2.6" fill="url(#g-shadow)"/>

      <!-- build plate: a thin dark navy iso slab the column grows from -->
      <g class="plate">
        <path d="M32 30.4 L20.9 36.4 L9.8 30.4 L20.9 24.4 Z" fill="#111827" transform="translate(11.1 5.3) scale(0.62 0.92)"/>
        <path d="M44.4 35.2 L32 42 L19.6 35.2" fill="none" stroke="#14b8a6" stroke-width="0.6" stroke-opacity="0.4" stroke-linejoin="round"/>
        <path d="M44.4 35.2 L32 42 L32 43.5 L44.4 36.7 Z" fill="#0b1220"/>
        <path d="M19.6 35.2 L32 42 L32 43.5 L19.6 36.7 Z" fill="url(#g-plate)"/>
      </g>

      <!-- ===== twisted column: square-section slabs stack bottom-up, each rotated more ===== -->
      <g class="sl sl0">
        <path d="M23.495 30.8 L32.0 26.136 L34.046 24.044 L24.056 27.278 Z" fill="url(#g-B)"/>
        <path d="M32.0 26.136 L40.505 30.8 L39.944 29.522 L34.046 24.044 Z" fill="url(#g-L)"/>
        <path d="M32.0 35.464 L23.495 30.8 L24.056 27.278 L29.954 32.756 Z" fill="url(#g-B)"/>
        <path d="M40.505 30.8 L32.0 35.464 L29.954 32.756 L39.944 29.522 Z" fill="url(#g-R)"/>
        <path class="flash" d="M32.0 35.464 L23.495 30.8 L32.0 26.136 L40.505 30.8 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl1">
        <path d="M24.056 27.278 L34.046 24.044 L35.817 22.206 L25.082 23.907 Z" fill="url(#g-B)"/>
        <path d="M34.046 24.044 L39.944 29.522 L38.918 28.093 L35.817 22.206 Z" fill="url(#g-L)"/>
        <path d="M29.954 32.756 L24.056 27.278 L25.082 23.907 L28.183 29.794 Z" fill="url(#g-B)"/>
        <path d="M39.944 29.522 L29.954 32.756 L28.183 29.794 L38.918 28.093 Z" fill="url(#g-R)"/>
        <path class="flash" d="M29.954 32.756 L24.056 27.278 L34.046 24.044 L39.944 29.522 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl2">
        <path d="M25.082 23.907 L35.817 22.206 L37.215 20.569 L26.473 20.74 Z" fill="url(#g-L)"/>
        <path d="M35.817 22.206 L38.918 28.093 L37.527 26.46 L37.215 20.569 Z" fill="url(#g-L)"/>
        <path d="M28.183 29.794 L25.082 23.907 L26.473 20.74 L26.785 26.631 Z" fill="url(#g-B)"/>
        <path d="M38.918 28.093 L28.183 29.794 L26.785 26.631 L37.527 26.46 Z" fill="url(#g-R)"/>
        <path class="flash" d="M28.183 29.794 L25.082 23.907 L35.817 22.206 L38.918 28.093 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl3">
        <path d="M26.473 20.74 L37.215 20.569 L38.173 19.066 L28.109 17.815 Z" fill="url(#g-L)"/>
        <path d="M26.785 26.631 L26.473 20.74 L28.109 17.815 L25.827 23.334 Z" fill="url(#g-B)"/>
        <path d="M37.215 20.569 L37.527 26.46 L35.891 24.585 L38.173 19.066 Z" fill="url(#g-L)"/>
        <path d="M37.527 26.46 L26.785 26.631 L25.827 23.334 L35.891 24.585 Z" fill="url(#g-R)"/>
        <path class="flash" d="M26.785 26.631 L26.473 20.74 L37.215 20.569 L37.527 26.46 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl4">
        <path d="M28.109 17.815 L38.173 19.066 L38.661 17.629 L29.864 15.147 Z" fill="url(#g-L)"/>
        <path d="M25.827 23.334 L28.109 17.815 L29.864 15.147 L25.339 19.971 Z" fill="url(#g-B)"/>
        <path d="M38.173 19.066 L35.891 24.585 L34.136 22.453 L38.661 17.629 Z" fill="url(#g-R)"/>
        <path d="M35.891 24.585 L25.827 23.334 L25.339 19.971 L34.136 22.453 Z" fill="url(#g-R)"/>
        <path class="flash" d="M25.827 23.334 L28.109 17.815 L38.173 19.066 L35.891 24.585 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl5">
        <path d="M29.864 15.147 L38.661 17.629 L38.682 16.187 L31.611 12.736 Z" fill="url(#g-L)"/>
        <path d="M25.339 19.971 L29.864 15.147 L31.611 12.736 L25.318 16.613 Z" fill="url(#g-B)"/>
        <path d="M38.661 17.629 L34.136 22.453 L32.389 20.064 L38.682 16.187 Z" fill="url(#g-R)"/>
        <path d="M34.136 22.453 L25.339 19.971 L25.318 16.613 L32.389 20.064 Z" fill="url(#g-B)"/>
        <path class="flash" d="M25.339 19.971 L29.864 15.147 L38.661 17.629 L34.136 22.453 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl6">
        <path d="M25.318 16.613 L31.611 12.736 L33.232 10.561 L25.729 13.325 Z" fill="url(#g-B)"/>
        <path d="M31.611 12.736 L38.682 16.187 L38.271 14.675 L33.232 10.561 Z" fill="url(#g-L)"/>
        <path d="M32.389 20.064 L25.318 16.613 L25.729 13.325 L30.768 17.439 Z" fill="url(#g-B)"/>
        <path d="M38.682 16.187 L32.389 20.064 L30.768 17.439 L38.271 14.675 Z" fill="url(#g-R)"/>
        <path class="flash" d="M32.389 20.064 L25.318 16.613 L31.611 12.736 L38.682 16.187 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl7">
        <path d="M25.729 13.325 L33.232 10.561 L34.627 8.588 L26.507 10.16 Z" fill="url(#g-B)"/>
        <path d="M33.232 10.561 L38.271 14.675 L37.493 13.04 L34.627 8.588 Z" fill="url(#g-L)"/>
        <path d="M30.768 17.439 L25.729 13.325 L26.507 10.16 L29.373 14.612 Z" fill="url(#g-B)"/>
        <path d="M38.271 14.675 L30.768 17.439 L29.373 14.612 L37.493 13.04 Z" fill="url(#g-R)"/>
        <path class="flash" d="M30.768 17.439 L25.729 13.325 L33.232 10.561 L38.271 14.675 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>
      <g class="sl sl8">
        <path d="M26.507 10.16 L34.627 8.588 L35.72 6.769 L27.567 7.16 Z" fill="url(#g-L)"/>
        <path d="M34.627 8.588 L37.493 13.04 L36.433 11.24 L35.72 6.769 Z" fill="url(#g-L)"/>
        <path d="M29.373 14.612 L26.507 10.16 L27.567 7.16 L28.28 11.631 Z" fill="url(#g-B)"/>
        <path d="M37.493 13.04 L29.373 14.612 L28.28 11.631 L36.433 11.24 Z" fill="url(#g-R)"/>
        <!-- finished top cap -->
        <path d="M27.567 7.16 L35.72 6.769 L36.433 11.24 L28.28 11.631 Z" fill="url(#g-cap)"/>
        <!-- a warm amber maker's spark on the topmost lit corner -->
        <path d="M34.0 8.0 L35.55 6.95" fill="none" stroke="#fbbf24" stroke-width="1.1" stroke-linecap="round" opacity="0.95"/>
        <path class="flash" d="M27.567 7.16 L35.72 6.769 L36.433 11.24 L28.28 11.631 Z" fill="none" stroke="#ccfbf1" stroke-width="1" stroke-opacity="0" stroke-linejoin="round"/>
      </g>

      <!-- ===== spiraling lit corner-edges (drawn over the faces, masked per-layer) ===== -->
      <g class="spiral" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- left & right outer silhouette spirals: bright lit teal -->
        <path class="sp" d="M32.0 35.464 L29.954 32.756 L28.183 29.794 L26.785 26.631 L25.827 23.334 L25.339 19.971 L25.318 16.613 L25.729 13.325 L26.507 10.16 L27.567 7.16" stroke="#ccfbf1" stroke-width="1.05" stroke-opacity="0.92"/>
        <path class="sp" d="M40.505 30.8 L39.944 29.522 L38.918 28.093 L37.527 26.46 L35.891 24.585 L34.136 22.453 L32.389 20.064 L30.768 17.439 L29.373 14.612 L28.28 11.631" stroke="#5eead4" stroke-width="0.95" stroke-opacity="0.85"/>
        <!-- the front face-meeting spiral: a softer teal seam -->
        <path class="sp" d="M32.0 26.136 L34.046 24.044 L35.817 22.206 L37.215 20.569 L38.173 19.066 L38.661 17.629 L38.682 16.187 L38.271 14.675 L37.493 13.04 L36.433 11.24" stroke="#2dd4bf" stroke-width="0.7" stroke-opacity="0.6"/>
      </g>
    </svg>