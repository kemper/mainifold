<svg class="il-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — two interlocked square-tube rings, teal and amber, woven in a physically impossible way">
      <defs>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <!-- lit TOP face of the teal tube -->
        <linearGradient id="h-tealtop" x1="8" y1="14" x2="44" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <!-- lit TOP face of the amber tube (the impossible part) -->
        <linearGradient id="h-ambertop" x1="22" y1="14" x2="56" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/>
        </linearGradient>
        <!-- clip covering ONLY the upper-left crossing: where teal's top bar meets amber's left bar.
             Redrawing the teal ring through this clip makes teal ride OVER amber here, while amber
             stays over teal at the lower-right crossing — the contradiction that makes it impossible. -->
        <clipPath id="h-weave"><rect x="18.4" y="14.4" width="11.6" height="10.2"/></clipPath>
      </defs>

      <!-- contact shadow grounds the solid -->
      <ellipse cx="32" cy="60" rx="21" ry="2.4" fill="url(#h-shadow)"/>

      <!-- ============================================================
           IMPOSSIBLE INTERLOCK — two square-tube RINGS (chain links).
           Each ring = a rounded-square annulus drawn FRONTALLY:
             · a dark, down-right-offset copy = the tube SIDE WALL (volume)
             · the bright front-face band on top = the lit TOP of the tube
           Ring A = teal (left), Ring B = amber (right). They overlap so
           each tube passes THROUGH the other; at the two crossings the
           over/under is deliberately CONTRADICTORY (A over B up top, B
           over A at the bottom) while each tube stays continuous — the
           "aha". The weave is forced by overpainting short tube segments
           at the two crossing zones, after the base rings are laid down.
           ============================================================ -->

      <!-- depth / side wall of BOTH rings first (offset down-right), so the
           bright tops sit proud of their own walls. -->
      <g class="il-wall">
        <!-- teal A wall -->
        <path transform="translate(1.7,1.9)" fill="#0a5b52" fill-rule="evenodd"
          d="M11.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
             M16.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>
        <!-- amber B wall -->
        <path transform="translate(1.7,1.9)" fill="#9a5a05" fill-rule="evenodd"
          d="M25.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
             M30.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>
      </g>

      <!-- BASE rings, bright tops. Painted A then B, so B is on top everywhere by default. -->
      <!-- teal A top -->
      <path fill="url(#h-tealtop)" stroke="#0a5b52" stroke-width="0.6" fill-rule="evenodd"
        d="M11.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
           M16.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>
      <!-- amber B top -->
      <path fill="url(#h-ambertop)" stroke="#9a5a05" stroke-width="0.6" fill-rule="evenodd"
        d="M25.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
           M30.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>

      <!-- IMPOSSIBLE WEAVE: at the upper-left crossing, force the TEAL tube to ride OVER amber.
           Redraw teal's wall + bright top, clipped to just that crossing cell. Amber still wins
           the lower-right crossing (painted later above), so the over/under is contradictory. -->
      <g clip-path="url(#h-weave)">
        <!-- teal wall (offset) then bright top, same paths as the base teal ring -->
        <path transform="translate(1.7,1.9)" fill="#0a5b52" fill-rule="evenodd"
          d="M11.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
             M16.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>
        <path fill="url(#h-tealtop)" fill-rule="evenodd"
          d="M11.2,16.5 h27.6 a4.2,4.2 0 0 1 4.2,4.2 v22.6 a4.2,4.2 0 0 1 -4.2,4.2 h-27.6 a4.2,4.2 0 0 1 -4.2,-4.2 v-22.6 a4.2,4.2 0 0 1 4.2,-4.2 z
             M16.2,23.2 a2,2 0 0 0 -2,2 v13.6 a2,2 0 0 0 2,2 h17.6 a2,2 0 0 0 2,-2 v-13.6 a2,2 0 0 0 -2,-2 z"/>
        <!-- crisp seam where teal passes over amber, sells the over-tube edge -->
        <path d="M30,16.5 v6.7" fill="none" stroke="#0a5b52" stroke-width="0.7"/>
      </g>

      <!-- crisp lit highlight along the two top edges of each tube to sell the machined solid -->
      <g fill="none" stroke-linecap="round" opacity="0.8">
        <path d="M12,17.2 h26.4" stroke="#ccfbf1" stroke-width="0.7"/>
        <path d="M26.4,17.2 h26.0" stroke="#fef3c7" stroke-width="0.7"/>
      </g>
    </svg>